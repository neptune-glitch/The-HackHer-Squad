<!DOCTYPE html>
<html>
<head>
    <title>Register - GigShield</title>
</head>
<body>
    <h1>🛡️ GigShield Registration</h1>
    
    <form method="POST" action="/register">
        <input type="text" name="name" 
               placeholder="Full Name" required>
        <br><br>
        
        <input type="text" name="phone" 
               placeholder="Phone Number" required>
        <br><br>
        
        <select name="zone" required>
            <option value="">Select Zone</option>
            <option value="Dwarka">Dwarka</option>
            <option value="Lajpat Nagar">
                Lajpat Nagar</option>
            <option value="Rohini">Rohini</option>
            <option value="Connaught Place">
                Connaught Place</option>
        </select>
        <br><br>
        
        <input type="text" name="upi" 
               placeholder="UPI ID" required>
        <br><br>
        
        <select name="platform" required>
            <option value="">Select Platform</option>
            <option value="Amazon">Amazon</option>
            <option value="Flipkart">Flipkart</option>
        </select>
        <br><br>
        
        <select name="plan" required>
            <option value="">Select Plan</option>
            <option value="Basic - ₹25/week">
                Basic - ₹25/week</option>
            <option value="Standard - ₹40/week">
                Standard - ₹40/week</option>
            <option value="Premium - ₹60/week">
                Premium - ₹60/week</option>
        </select>
        <br><br>
        
        <input type="password" name="password" 
               placeholder="Password" required>
        <br><br>
        
        <button type="submit">Register Now</button>
    </form>
    
    <p>Already registered? 
        <a href="/login">Login here</a>
    </p>
</body>
</html>
